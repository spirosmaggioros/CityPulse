user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 8192; # Increased for WebSockets
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Optimization ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 15M;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # --- Gzip (Global) ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml application/wasm;

    # --- Rate Limiting Zones ---
    # limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=180r/m;
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_status 429;

    # ── HTTP → HTTPS Redirect ──
    server {
        listen 80;
        listen [::]:80;
        server_name ${DOMAIN};

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ──
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ${DOMAIN};

        # SSL Certificates
        ssl_certificate     /etc/nginx/ssl/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/${DOMAIN}/privkey.pem;

        # SSL Hardening & OCSP
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/live/${DOMAIN}/fullchain.pem;
        resolver 1.1.1.1 8.8.8.8 valid=300s;

        # Include Security Snippet
        include /etc/nginx/snippets/security.conf;

        # --- Proxy Common Headers ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. Health Check
        location /ping {
            # limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend:8000;
        }

        # 2. Chainlit Chat (WebSockets)
        location ^~ /chat {
            # limit_req zone=chat_limit burst=10 nodelay;
            proxy_pass http://chainlit:8001/chat;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 86400;
        }

        # 3. API
        location ^~ /api/ {
            # limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api(.*)$ $1 break;
            proxy_pass http://backend:8000;
        }

        # 4. Static Assets (Aggressive Caching)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/snippets/security.conf; # Re-include because of add_header
            access_log off;
            try_files $uri =404;
        }

        # 5. Uploads
        location ^~ /uploads/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public";
            include /etc/nginx/snippets/security.conf; # Re-include
            try_files $uri =404;
        }

        # 6. SPA Fallback
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            include /etc/nginx/snippets/security.conf; # Re-include
        }
    }
}